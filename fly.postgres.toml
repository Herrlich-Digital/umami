# Unmanaged PostgreSQL app for umami
# Costs: ~$1.94/month (shared-cpu-1x, 256 MB) + volume storage (~$0.15/GB/month)
#
# First-time setup (run once):
#   1. fly apps create umami-falling-waterfall-1667-db
#   2. fly volumes create umami_pgdata --app umami-falling-waterfall-1667-db --region fra --size 1
#   3. fly secrets set \
#        POSTGRES_USER=umami \
#        POSTGRES_PASSWORD=<your-secret> \
#        POSTGRES_DB=umami \
#        --app umami-falling-waterfall-1667-db
#   4. fly deploy --config fly.postgres.toml --app umami-falling-waterfall-1667-db
#   5. fly secrets set \
#        DATABASE_URL="postgresql://umami:<your-secret>@umami-falling-waterfall-1667-db.flycast:5432/umami" \
#        --app umami-falling-waterfall-1667
#
# Data migration from managed Fly Postgres:
#   fly proxy 5433:5432 --app <old-managed-pg-app> &
#   pg_dump -h localhost -p 5433 -U <user> umami > umami.sql
#   fly proxy 5434:5432 --app umami-falling-waterfall-1667-db &
#   psql -h localhost -p 5434 -U umami umami < umami.sql

app = 'umami-falling-waterfall-1667-db'
primary_region = 'fra'

[build]
  image = 'postgres:16-alpine'

[env]
  PGDATA = '/var/lib/postgresql/data/pgdata'
  POSTGRES_INITDB_ARGS = '--auth-local=scram-sha-256 --auth-host=scram-sha-256'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

# No [services] or [http_service] block — the DB is reachable exclusively via
# Fly's private 6PN network at umami-falling-waterfall-1667-db.flycast:5432
# (or the .internal hostname). No public port is exposed.
# Keep the machine always running (default) so the main app never faces a
# cold-start connection failure. At 256 MB shared-cpu-1x: ~$1.94/month.

[[mounts]]
  source = 'umami_pgdata'
  destination = '/var/lib/postgresql/data'
  initial_size = '1gb'
