# Backup app for umami PostgreSQL → S3
# Costs: ~$1.94/month (shared-cpu-1x, 256 MB, always-on for cron)
#
# First-time setup (run once):
#   1. fly apps create umami-falling-waterfall-1667-backup
#   2. fly secrets set \
#        DATABASE_URL="postgresql://umami:<secret>@umami-falling-waterfall-1667-db.flycast:5432/umami" \
#        S3_BUCKET="<your-bucket-name>" \
#        AWS_ACCESS_KEY_ID="<key>" \
#        AWS_SECRET_ACCESS_KEY="<secret>" \
#        AWS_DEFAULT_REGION="eu-central-1" \
#        --app umami-falling-waterfall-1667-backup
#   3. fly deploy --config fly.backup.toml --app umami-falling-waterfall-1667-backup
#
# Optional secrets:
#   S3_PREFIX   — path prefix in bucket (default: "umami")
#   RETAIN_DAYS — days to keep backups (default: 30)
#
# Manual backup trigger:
#   fly ssh console --app umami-falling-waterfall-1667-backup -C /usr/local/bin/backup.sh

app = 'umami-falling-waterfall-1667-backup'
primary_region = 'fra'

[build]
  dockerfile = 'docker/backup/Dockerfile'
  dockerignore_file = '.dockerignore'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

# No services — this app has no inbound traffic, it only runs outbound backup jobs
