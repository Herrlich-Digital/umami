app = 'umami-falling-waterfall-1667'
primary_region = 'fra'

[build]

[env]
  PORT = "3000"
  HOSTNAME = "0.0.0.0"

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
